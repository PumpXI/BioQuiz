<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioQuiz — Estudio interactivo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #f3e7ff 0%, #e0c3fc 50%, #c9b1ff 100%);
    min-height: 100vh;
    padding: 16px;
    color: #2d1b4e;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(80, 30, 150, 0.15);
    overflow: hidden;
  }
  header {
    background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
    color: #fff;
    padding: 24px 20px;
    text-align: center;
  }
  header h1 { font-size: 26px; margin-bottom: 4px; letter-spacing: 0.5px; }
  header p { font-size: 14px; opacity: 0.95; }
  .main { padding: 20px; }
  
  /* Módulos */
  .modules { display: grid; gap: 12px; }
  .module-card {
    background: #faf5ff;
    border: 2px solid #e9d5ff;
    border-radius: 14px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .module-card:hover { background: #f3e8ff; border-color: #a855f7; transform: translateY(-2px); }
  .module-icon { font-size: 32px; flex-shrink: 0; }
  .module-info h3 { color: #6b21a8; font-size: 16px; margin-bottom: 2px; }
  .module-info p { font-size: 13px; color: #7e22ce; opacity: 0.85; }
  
  /* Selector de modo */
  .mode-selector { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 16px; }
  .mode-btn {
    background: #faf5ff;
    border: 2px solid #e9d5ff;
    border-radius: 12px;
    padding: 14px 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 14px;
    color: #6b21a8;
    font-weight: 600;
    text-align: center;
  }
  .mode-btn:hover { background: #f3e8ff; border-color: #a855f7; }
  .mode-btn .icon { display: block; font-size: 22px; margin-bottom: 4px; }
  
  /* Back button */
  .back-btn {
    background: transparent;
    border: none;
    color: #7c3aed;
    cursor: pointer;
    font-size: 14px;
    margin-bottom: 14px;
    padding: 6px 0;
    font-weight: 600;
  }
  .back-btn:hover { color: #6b21a8; }
  
  /* Header de modo */
  .mode-header {
    background: #f3e8ff;
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .mode-header h2 { color: #6b21a8; font-size: 16px; }
  .progress {
    font-size: 13px;
    color: #7e22ce;
    font-weight: 600;
    background: #fff;
    padding: 4px 10px;
    border-radius: 20px;
  }
  
  /* Progress bar */
  .progress-bar {
    height: 6px;
    background: #e9d5ff;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #7c3aed, #c084fc);
    transition: width 0.4s ease;
    border-radius: 10px;
  }
  
  /* Flashcard */
  .flashcard {
    background: linear-gradient(135deg, #faf5ff, #f3e8ff);
    border: 2px solid #d8b4fe;
    border-radius: 18px;
    padding: 30px 20px;
    min-height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
    margin-bottom: 14px;
    transition: all 0.3s;
    position: relative;
  }
  .flashcard:hover { box-shadow: 0 8px 20px rgba(168, 85, 247, 0.2); }
  .flashcard-label {
    position: absolute;
    top: 12px;
    left: 16px;
    font-size: 11px;
    text-transform: uppercase;
    color: #a855f7;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .flashcard-content {
    font-size: 18px;
    line-height: 1.5;
    color: #2d1b4e;
    font-weight: 500;
  }
  .flashcard-hint {
    position: absolute;
    bottom: 10px;
    right: 16px;
    font-size: 11px;
    color: #a855f7;
    opacity: 0.7;
  }
  
  /* Pregunta */
  .question-box {
    background: #faf5ff;
    border-left: 4px solid #a855f7;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .question-text { font-size: 16px; line-height: 1.5; color: #2d1b4e; font-weight: 500; }
  
  /* Opciones */
  .options { display: grid; gap: 10px; margin-bottom: 16px; }
  .option {
    background: #fff;
    border: 2px solid #e9d5ff;
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 15px;
    text-align: left;
    color: #2d1b4e;
    line-height: 1.4;
  }
  .option:hover:not(:disabled) { background: #f3e8ff; border-color: #a855f7; }
  .option.correct { background: #d1fae5; border-color: #10b981; color: #065f46; }
  .option.incorrect { background: #fee2e2; border-color: #ef4444; color: #991b1b; }
  .option:disabled { cursor: default; }
  
  /* Input */
  .text-input {
    width: 100%;
    background: #fff;
    border: 2px solid #e9d5ff;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 15px;
    color: #2d1b4e;
    font-family: inherit;
    resize: vertical;
    transition: border-color 0.2s;
  }
  .text-input:focus { outline: none; border-color: #a855f7; }
  .text-input.long { min-height: 120px; }
  
  /* Botones */
  .btn {
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 12px;
    width: 100%;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(124, 58, 237, 0.3); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-secondary {
    background: #fff;
    color: #7c3aed;
    border: 2px solid #d8b4fe;
  }
  .btn-secondary:hover { background: #f3e8ff; }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  
  /* Feedback */
  .feedback {
    margin-top: 14px;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
  }
  .feedback.success {
    background: #d1fae5;
    border-left: 4px solid #10b981;
    color: #065f46;
  }
  .feedback.error {
    background: #fee2e2;
    border-left: 4px solid #ef4444;
    color: #991b1b;
  }
  .feedback.partial {
    background: #fef3c7;
    border-left: 4px solid #f59e0b;
    color: #78350f;
  }
  .feedback strong { display: block; margin-bottom: 6px; font-size: 15px; }
  
  /* Self-check (desarrollo) */
  .self-check {
    background: #faf5ff;
    border: 2px solid #d8b4fe;
    border-radius: 12px;
    padding: 14px;
    margin-top: 14px;
  }
  .self-check h4 { color: #6b21a8; font-size: 14px; margin-bottom: 10px; }
  .keyword-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .keyword {
    background: #fff;
    border: 2px solid #e9d5ff;
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    color: #6b21a8;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .keyword.checked { background: #10b981; color: #fff; border-color: #10b981; }
  .keyword.checked::before { content: "✓ "; }
  .model-answer {
    background: #fff;
    border-radius: 10px;
    padding: 12px;
    font-size: 13px;
    line-height: 1.6;
    color: #2d1b4e;
    margin-top: 10px;
  }
  .model-answer-title {
    font-size: 12px;
    font-weight: 700;
    color: #7c3aed;
    text-transform: uppercase;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }
  
  /* Resultado final */
  .results {
    text-align: center;
    padding: 30px 20px;
  }
  .results-emoji { font-size: 64px; margin-bottom: 14px; }
  .results h2 { color: #6b21a8; font-size: 22px; margin-bottom: 6px; }
  .results p { color: #7e22ce; font-size: 15px; margin-bottom: 20px; }
  .results-score {
    font-size: 36px;
    font-weight: 700;
    color: #7c3aed;
    margin: 10px 0;
  }
  
  .hidden { display: none !important; }
  
  @media (max-width: 480px) {
    header h1 { font-size: 22px; }
    .module-card { padding: 14px; }
    .flashcard-content { font-size: 16px; }
    .btn-row { grid-template-columns: 1fr; }
  }
</style>
</head>

function normalize(s) {
  return s.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^\w\s]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function checkKeywords(answer, keywords) {
  const norm = normalize(answer);
  const found = [];
  const missing = [];
  keywords.forEach(k => {
    if (norm.includes(normalize(k))) found.push(k);
    else missing.push(k);
  });
  return { found, missing, ratio: found.length / keywords.length };
}

function answerQuiz(selected) {
  if (state.answered) return;
  state.answered = true;
  const q = quiz[state.module][state.index];
  const buttons = document.querySelectorAll("#quiz-options .option");
  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.correct) b.classList.add("correct");
    else if (i === selected) b.classList.add("incorrect");
  });
  
  const isCorrect = selected === q.correct;
  if (isCorrect) state.score++;
  
  const feedback = document.getElementById("quiz-feedback");
  feedback.innerHTML = `
    <div class="feedback ${isCorrect ? "success" : "error"}">
      <strong>${isCorrect ? "¡Correcto! 🎉" : "Incorrecto 😕"}</strong>
      ${!isCorrect ? `La respuesta correcta era: <strong style="display:inline;">${String.fromCharCode(65+q.correct)}) ${q.opts[q.correct]}</strong><br><br>` : ""}
      ${q.exp}
    </div>
  `;
  document.getElementById("quiz-next").classList.remove("hidden");
}

function nextQuiz() {
  state.answered = false;
  if (state.index < state.total - 1) {
    state.index++;
    renderQuiz();
  } else {
    renderResults();
  }
}

// ----- RESPUESTA CORTA -----
function renderShort() {
  const q = shortAnswer[state.module][state.index];
  main.innerHTML = `
    ${renderHeader()}
    <div class="question-box">
      <div class="question-text">${q.q}</div>
    </div>
    <textarea class="text-input" id="short-input" placeholder="Escribe tu respuesta aquí..." rows="3"></textarea>
    <button class="btn" id="short-submit" onclick="checkShort()">Verificar respuesta</button>
    <div id="short-feedback"></div>
    <button class="btn hidden" id="short-next" onclick="nextShort()">${state.index === state.total - 1 ? "Ver resultados ✓" : "Siguiente pregunta →"}</button>
  `;
}

function checkShort() {
  if (state.answered) return;
  const input = document.getElementById("short-input").value.trim();
  if (!input) {
    alert("Por favor escribe una respuesta antes de verificar.");
    return;
  }
  state.answered = true;
  
  const q = shortAnswer[state.module][state.index];
  const result = checkKeywords(input, q.keywords);
  
  let level, emoji, msg;
  if (result.ratio >= 0.85) { level = "success"; emoji = "🎉"; msg = "¡Excelente! Tu respuesta cubre lo más importante."; state.score++; }
  else if (result.ratio >= 0.5) { level = "partial"; emoji = "🤔"; msg = "Vas bien, pero te faltaron algunos puntos clave."; state.score += 0.5; }
  else { level = "error"; emoji = "📚"; msg = "Necesitas repasar este tema. Mira la respuesta modelo abajo."; }
  
  document.getElementById("short-input").disabled = true;
  document.getElementById("short-submit").classList.add("hidden");
  
  const foundList = result.found.length ? result.found.map(k => `<span style="background:#10b981;color:#fff;padding:2px 8px;border-radius:12px;font-size:12px;margin:2px;display:inline-block;">✓ ${k}</span>`).join(" ") : "<em>Ninguno</em>";
  const missingList = result.missing.length ? result.missing.map(k => `<span style="background:#fecaca;color:#991b1b;padding:2px 8px;border-radius:12px;font-size:12px;margin:2px;display:inline-block;">✗ ${k}</span>`).join(" ") : "";
  
  document.getElementById("short-feedback").innerHTML = `
    <div class="feedback ${level}">
      <strong>${emoji} ${msg}</strong>
      <div style="margin-top:8px;"><strong style="display:inline;font-size:13px;">Conceptos clave que mencionaste:</strong><br>${foundList}</div>
      ${missingList ? `<div style="margin-top:8px;"><strong style="display:inline;font-size:13px;">Te faltaron:</strong><br>${missingList}</div>` : ""}
    </div>
    <div class="model-answer">
      <div class="model-answer-title">Respuesta modelo</div>
      ${q.model}
    </div>
  `;
  document.getElementById("short-next").classList.remove("hidden");
}

function nextShort() {
  state.answered = false;
  if (state.index < state.total - 1) {
    state.index++;
    renderShort();
  } else {
    renderResults();
  }
}

// ----- DESARROLLO -----
function renderDevelopment() {
  const q = development[state.module][state.index];
  main.innerHTML = `
    ${renderHeader()}
    <div class="question-box">
      <div class="question-text">${q.q}</div>
    </div>
    <p style="font-size:12px;color:#6b21a8;margin-bottom:8px;">📝 Escribe tu respuesta con detalle. Después aparecerá la respuesta modelo y podrás autoevaluarte.</p>
    <textarea class="text-input long" id="dev-input" placeholder="Desarrolla tu respuesta aquí, en varias oraciones..."></textarea>
    <button class="btn" id="dev-submit" onclick="reviewDevelopment()">Ver respuesta modelo y autoevaluarme</button>
    <div id="dev-feedback"></div>
    <button class="btn hidden" id="dev-next" onclick="nextDevelopment()">${state.index === state.total - 1 ? "Ver resultados ✓" : "Siguiente pregunta →"}</button>
  `;
}

function reviewDevelopment() {
  if (state.answered) return;
  const input = document.getElementById("dev-input").value.trim();
  if (!input || input.length < 30) {
    alert("Escribe una respuesta más desarrollada (al menos un par de oraciones) antes de continuar.");
    return;
  }
  state.answered = true;
  
  const q = development[state.module][state.index];
  const result = checkKeywords(input, q.keywords);
  state.selfChecked = result.found.slice();
  
  document.getElementById("dev-input").disabled = true;
  document.getElementById("dev-submit").classList.add("hidden");
  
  document.getElementById("dev-feedback").innerHTML = `
    <div class="model-answer">
      <div class="model-answer-title">Respuesta modelo</div>
      ${q.model}
    </div>
    <div class="self-check">
      <h4>✅ Autoevaluación — marca los conceptos que SÍ mencionaste en tu respuesta:</h4>
      <div class="keyword-list" id="keyword-list">
        ${q.keywords.map((k, i) => `
          <div class="keyword ${result.found.includes(k) ? "checked" : ""}" data-kw="${k}" onclick="toggleKeyword(this, '${k}')">${k}</div>
        `).join("")}
      </div>
      <p style="font-size:12px;color:#6b21a8;margin-bottom:8px;">💡 Hicimos una detección automática, pero <strong>tú</strong> decides si realmente cubriste cada concepto. Toca para marcar/desmarcar.</p>
      <button class="btn" onclick="finalizeDevelopment()">Confirmar y continuar</button>
    </div>
  `;
}

function toggleKeyword(el, kw) {
  el.classList.toggle("checked");
  if (state.selfChecked.includes(kw)) {
    state.selfChecked = state.selfChecked.filter(x => x !== kw);
  } else {
    state.selfChecked.push(kw);
  }
}

function finalizeDevelopment() {
  const q = development[state.module][state.index];
  const ratio = state.selfChecked.length / q.keywords.length;
  
  let level, emoji, msg;
  if (ratio >= 0.85) { level = "success"; emoji = "🎉"; msg = "¡Muy bien! Tu respuesta cubrió los puntos importantes."; state.score++; }
  else if (ratio >= 0.5) { level = "partial"; emoji = "🤔"; msg = "Buen intento, pero hubo conceptos clave que no incluiste."; state.score += 0.5; }
  else { level = "error"; emoji = "📚"; msg = "Te faltó bastante. Te recomiendo revisar la respuesta modelo y volver a intentarlo después."; }
  
  document.querySelector(".self-check").innerHTML = `
    <div class="feedback ${level}" style="margin-top:0;">
      <strong>${emoji} ${msg}</strong>
      Marcaste <strong style="display:inline;">${state.selfChecked.length} de ${q.keywords.length}</strong> conceptos clave.
    </div>
  `;
  document.getElementById("dev-next").classList.remove("hidden");
}

function nextDevelopment() {
  state.answered = false;
  state.selfChecked = [];
  if (state.index < state.total - 1) {
    state.index++;
    renderDevelopment();
  } else {
    renderResults();
  }
}

// ----- RESULTADOS -----
function renderResults() {
  const pct = Math.round((state.score / state.total) * 100);
  let emoji, title, msg;
  
  if (state.view === "flashcards") {
    main.innerHTML = `
      <div class="results">
        <div class="results-emoji">🎴</div>
        <h2>¡Tarjetas completadas!</h2>
        <p>Repasaste las ${state.total} flashcards de este tema.</p>
        <p style="margin-top:14px;">Ahora pon a prueba lo que aprendiste con uno de los otros modos:</p>
        <div class="btn-row" style="margin-top:14px;">
          <button class="btn btn-secondary" onclick="selectModule('${state.module}')">Otro modo</button>
          <button class="btn" onclick="renderHome()">Inicio</button>
        </div>
      </div>
    `;
    return;
  }
  
  if (pct >= 85) { emoji = "🏆"; title = "¡Excelente!"; msg = "Dominas este tema. Sigue así."; }
  else if (pct >= 70) { emoji = "👏"; title = "¡Muy bien!"; msg = "Vas en buen camino. Repasa los puntos donde fallaste."; }
  else if (pct >= 50) { emoji = "💪"; title = "Vas mejorando"; msg = "Tienes la base, pero te falta afinar algunos detalles."; }
  else { emoji = "📚"; title = "A repasar"; msg = "Te recomiendo volver a revisar las flashcards de este tema antes de seguir."; }
  
  main.innerHTML = `
    <div class="results">
      <div class="results-emoji">${emoji}</div>
      <h2>${title}</h2>
      <div class="results-score">${pct}%</div>
      <p>${state.score % 1 === 0 ? state.score : state.score.toFixed(1)} de ${state.total} ${state.total === 1 ? "pregunta" : "preguntas"}</p>
      <p style="margin-top:6px;">${msg}</p>
      <div class="btn-row" style="margin-top:20px;">
        <button class="btn btn-secondary" onclick="startMode('${state.view}')">Reintentar</button>
        <button class="btn" onclick="selectModule('${state.module}')">Otro modo</button>
      </div>
      <button class="btn btn-secondary" style="margin-top:10px;" onclick="renderHome()">Volver al inicio</button>
    </div>
  `;
}

// ========== INICIO ==========
renderHome();
</script>
</body>
</html>
